name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build C extension
        run: pip install -e .

      - name: Run Python integration tests
        run: python tests/test_integration.py

      - name: Check generated/extension.c is up to date
        run: |
          python -c "
          import _nbsterm
          t = _nbsterm.Terminal(24, 80)
          t.feed(b'\x1b[31mHello\x1b[0m')
          assert t.get_cell(0, 0)[0] == ord('H'), 'Extension not working'
          print('Extension OK')
          "
