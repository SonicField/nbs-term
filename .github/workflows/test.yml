name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build C extension
        run: pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Build phc from submodule
        run: make phc

      - name: Verify generated/extension.c is current
        run: make verify-regenerate

  test-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install dependencies
        run: brew install tcl-tk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build C extension
        run: pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Build phc from submodule
        run: make phc

      - name: Verify generated/extension.c is current
        run: make verify-regenerate

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build C extension
        run: pip install -e .

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
